<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEE Master Component Finder</title>
    <style>
        :root {
            --bg-main: #0f0f0f; /* YouTube Dark Theme Baseline */
            --bg-card: #212121;
            --bg-hover: #383838;
            --text-main: #ffffff; 
            --accent-orange: #ff6b00; 
            --border-line: #303030;
            --border-silver-lite: #c0c0c0;

            /* --- USER STYLED DIAGRAM PALETTE MATRIX CONFIG --- */
            --diag-bg: #FFFFFF;           
            --diag-emerald: #10B981;      
            --diag-blue: #1D4ED8;         
            --diag-text: #1F2937;         
            --diag-card: #F9FAFB;   
            --diag-border: #D1D5DB;       
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-container {
            width: 100%;
            max-width: 1000px;
            text-align: center;
            padding: 40px 20px 20px 20px;
            box-sizing: border-box;
        }

        h1.main-title { 
            font-size: 34px;
            font-weight: 800;
            margin: 0 0 10px 0;
            color: var(--accent-orange);
            text-transform: uppercase;
        }
        
        .subtitle { 
            color: var(--text-main);
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 620px;
            margin: 0 auto;
        }

        .search-box {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 700;
            background-color: #121212;
            border: 1.5px solid var(--border-silver-lite);
            border-radius: 40px;
            outline: none;
            color: var(--text-main);
            box-sizing: border-box;
        }

        .search-box:focus {
            border-color: var(--accent-orange);
        }

        .suggestions-panel {
            position: absolute;
            top: 105%;
            left: 0;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-line);
            border-radius: 12px;
            z-index: 999;
            max-height: 350px;
            overflow-y: auto;
            display: none;
        }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .suggestion-item:hover {
            background-color: var(--bg-hover);
        }

        .suggestion-item .item-name {
            font-weight: 700;
        }

        .suggestion-item .item-cat {
            font-size: 11px;
            font-weight: 800;
            background: var(--accent-orange);
            color: #ffffff;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .content-workspace {
            width: 100%;
            max-width: 900px;
            margin-top: 30px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .initial-state-view {
            text-align: center;
            padding: 80px 20px;
            font-weight: 700;
            border: 2px dashed var(--border-line);
            border-radius: 16px;
        }

        .full-page-detail-view {
            background: var(--bg-card);
            border: 1px solid var(--border-line);
            border-radius: 16px;
            padding: 30px;
            display: none;
        }

        .back-navigation-btn {
            background: var(--bg-hover);
            color: var(--text-main);
            border: 1px solid var(--accent-orange);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .detail-header-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-orange);
            margin: 0 0 5px 0;
        }

        /* --- PURE WHITE DIAGRAM BOX BLOCK SCOPE --- */
        .img-vector-block {
            width: 100%;
            background-color: var(--diag-bg) !important; /* Forces exact #FFFFFF Background */
            border: 3px solid var(--diag-border) !important; /* #D1D5DB Custom Outer Boundary Trace */
            border-radius: 14px;
            padding: 35px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            margin: 20px 0;
        }

        .img-vector-block svg {
            background-color: var(--diag-bg);
            overflow: visible;
        }
        
        .img-vector-block svg text {
            font-weight: 800;
            font-size: 14px;
            fill: var(--diag-text) !important; /* Strictly forces #1F2937 Text Colors */
        }

        .overview-box-text {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        table.matrix-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table.matrix-table th, table.matrix-table td {
            border: 1px solid var(--border-line);
            padding: 14px;
        }

        table.matrix-table th {
            background-color: #181818;
            color: var(--accent-orange);
            font-weight: 800;
        }

        table.matrix-table td {
            font-weight: 700;
        }

        .sub-variants-card {
            background: #181818;
            border-left: 4px solid var(--accent-orange);
            padding: 15px;
            border-radius: 6px;
            margin-top: 25px;
        }
        
        .sub-variants-card h5 { margin: 0 0 5px 0; color: var(--accent-orange); }
        .sub-variants-card p { margin: 0; font-weight: 700; }

        .substitute-badge-container {
            margin-top: 20px;
            font-weight: 700;
        }

        .substitute-badge-container span.token {
            color: #4ade80;
            font-family: monospace;
            font-size: 16px;
            font-weight: 800;
        }
    </style>
</head>
<body>

        <div class="subtitle">Complete Hub: Passive, Semiconductors, ICs, Switch Gears, Power & Logic Matrices</div>
        
        <div class="search-wrapper">

        function executeSearchEngine() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const panel = document.getElementById('suggestionsPanel');

            if (query.length === 0) {
                panel.style.display = 'none';
                return;
            }

            const matched = componentDatabase.filter(item => 
                item.name.toLowerCase().replace(/\s+/g, '').includes(query.replace(/\s+/g, '')) || 
                item.category.toLowerCase().includes(query)
            );

            if (matched.length === 0) {
                panel.innerHTML = `<div class="suggestion-item" style="color:var(--text-main); font-style:italic;">No active results found...</div>`;
                panel.style.display = 'block';
                return;
            }

            panel.innerHTML = '';
            matched.forEach(item => {
                const row = document.createElement('div');
                row.className = 'suggestion-item';
                row.innerHTML = `
                    <span class="item-name">${item.name}</span>
                    <span class="item-cat">${item.category.split(' ')[0]}</span>
                `;
                row.onclick = () => routingToNextPage(item);
                panel.appendChild(row);
            });

            panel.style.display = 'block';
        }

        document.addEventListener('click', function(e) {
            if (e.target.id !== 'searchInput') {
                document.getElementById('suggestionsPanel').style.display = 'none';
            }
        });

        function routingToNextPage(item) {
            document.getElementById('suggestionsPanel').style.display = 'none';
            
            const initialView = document.getElementById('initialStateView');
            const pageView = document.getElementById('fullPageDetailView');
            const injectionPoint = document.getElementById('injectionDetailsTarget');

            let pinRows = '';
            for (let [pin, desc] of Object.entries(item.pins)) {
                pinRows += `<tr><td>${pin}</td><td>${desc}</td></tr>`;
            }

            injectionPoint.innerHTML = `
                <h2 class="detail-header-title">${item.name}</h2>
                <div class="detail-meta-tag">Domain Category Matrix: ${item.category}</div>
                
                <h4 style="margin: 20px 0 5px 0; color: var(--accent-orange);">⚡ Component Vector Symbol Schematic:</h4>
                <div class="img-vector-block">
                    ${item.image}
                </div>

                <p class="overview-box-text">Technical Functional Overview: ${item.desc}</p>
                
                <h3 style="margin-top:25px; font-weight:800; text-transform:uppercase; font-size:16px; color: var(--accent-orange);">📍 Pin Configuration Grid Array</h3>
                <table class="matrix-table">
                    <thead>
                        <tr>
                            <th>Terminal Pin Node</th>
                            <th>Functional Description Reference Parameter</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${pinRows}
                    </tbody>
                </table>
                
                <div class="sub-variants-card">
                    <h5>⚙️ Core Extensions & Sub-Class Parameters</h5>
                    <p>${item.details}</p>
                </div>

                <div class="substitute-badge-container">
                    🔄 Industry Standard Equivalents: <span class="token">${item.alts.join(', ')}</span>
                </div>
            `;

            initialView.style.display = 'none';
            pageView.style.display = 'block';
        }

        function returnToSearchHome() {
            document.getElementById('fullPageDetailView').style.display = 'none';
            document.getElementById('initialStateView').style.display = 'block';
            document.getElementById('searchInput').value = '';
        }
    </script>
</body>
</html>
